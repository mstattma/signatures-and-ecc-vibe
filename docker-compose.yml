# Docker Compose: Hardhat node + Scaffold-ETH 2 UI
#
# Usage:
#   docker compose up              # Start node + UI
#   docker compose up -d           # Start in background
#   docker compose logs -f         # Follow all logs
#   docker compose logs -f node    # Follow node logs only
#   docker compose logs -f ui      # Follow UI logs only
#   docker compose down            # Stop everything
#
# Services:
#   node: Hardhat node on http://localhost:8545 (auto-deploys contracts)
#   ui:   Scaffold-ETH 2 on http://localhost:3000 (auto-generates contract ABIs)
#
# The UI waits for the node to deploy contracts, then generates
# externalContracts.ts from the deployment and starts Next.js.

services:
  node:
    build:
      context: ./ethereum-ledger
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
    volumes:
      # Sync deployment.json back to host
      - ./ethereum-ledger:/host
      # Use latest host scripts without rebuilding the image
      - ./ethereum-ledger/scripts:/app/scripts:ro
      # Share deployment data with the UI container
      - shared-data:/shared
    # Health check: calls eth_blockNumber via JSON-RPC to verify the node is responding.
    # The UI container waits for this check to pass before starting (depends_on: condition: service_healthy).
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8545', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',method:'eth_blockNumber',params:[],id:1})}).then(r=>r.json()).then(d=>{if(d.result)process.exit(0);process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Read deployment data from the node container
      - shared-data:/shared:ro
      # Persist Next.js compilation cache across container restarts
      # Avoids ~40s first-page compile on every restart
      # Invalidated automatically by Next.js when source files change
      - nextjs-cache:/app/packages/nextjs/.next
    depends_on:
      node:
        condition: service_healthy
    environment:
      # Tell Next.js to bind to all interfaces
      - HOSTNAME=0.0.0.0

volumes:
  shared-data:
  nextjs-cache:
